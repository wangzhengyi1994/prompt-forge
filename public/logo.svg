<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="fire" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Anvil base -->
  <rect x="136" y="340" width="240" height="36" rx="8" fill="rgba(255,255,255,0.9)"/>
  <rect x="196" y="360" width="120" height="48" rx="6" fill="rgba(255,255,255,0.7)"/>
  <!-- Hammer -->
  <rect x="232" y="180" width="20" height="140" rx="4" fill="rgba(255,255,255,0.85)" transform="rotate(-15 242 250)"/>
  <rect x="206" y="160" width="72" height="36" rx="8" fill="rgba(255,255,255,0.95)" transform="rotate(-15 242 178)"/>
  <!-- Flame/spark -->
  <path d="M256 100 C256 100 220 160 230 200 C235 220 250 210 250 190 C250 170 256 140 270 170 C280 190 290 220 280 200 C270 160 256 100 256 100Z" fill="url(#fire)" opacity="0.95"/>
  <!-- Sparkles -->
  <circle cx="180" cy="140" r="4" fill="#fbbf24" opacity="0.8"/>
  <circle cx="340" cy="160" r="3" fill="#fbbf24" opacity="0.6"/>
  <circle cx="160" cy="200" r="3" fill="#f97316" opacity="0.7"/>
  <circle cx="350" cy="120" r="4" fill="#f59e0b" opacity="0.7"/>
  <!-- P letter hint -->
  <text x="256" y="320" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="72" fill="rgba(255,255,255,0.95)">P</text>
</svg>
