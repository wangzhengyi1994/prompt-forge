<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 200px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      color: #a78bfa;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      background: #16213e;
      margin-bottom: 12px;
      text-align: center;
      color: #888;
    }
    .status.error { color: #f87171; }
    .field { margin-bottom: 10px; }
    .field-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field-value {
      background: #16213e;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      word-break: break-word;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      background: #a78bfa22;
      color: #a78bfa;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }
    .images { display: flex; gap: 4px; flex-wrap: wrap; }
    .images img {
      width: 48px; height: 48px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #333;
    }
    .actions {
      display: flex; gap: 8px;
      margin-top: 14px;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-copy {
      background: #334155;
      color: #e0e0e0;
    }
    .btn-send {
      background: #7c3aed;
      color: white;
    }
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: white;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <h1>🔥 Pico 采集</h1>
  <div id="status" class="status">正在读取页面...</div>
  <div id="result" style="display:none">
    <div class="field">
      <div class="field-label">标题</div>
      <div class="field-value" id="title"></div>
    </div>
    <div class="field">
      <div class="field-label">内容</div>
      <div class="field-value" id="content"></div>
    </div>
    <div class="field" id="tags-field">
      <div class="field-label">标签</div>
      <div class="tags" id="tags"></div>
    </div>
    <div class="field" id="images-field">
      <div class="field-label">图片</div>
      <div class="images" id="images"></div>
    </div>
    <div class="actions">
      <button class="btn-copy" id="btn-copy">📋 复制 JSON</button>
      <button class="btn-send" id="btn-send">🚀 发送到 Pico</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
